<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="html2canvas.min.js"></script>
    <style>
        body { background: #f0f2f5; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #capture { background: #fff; width: 450px; padding: 20px 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .header { display: flex; align-items: center; margin-bottom: 12px; }
        .avatar { width: 46px; height: 46px; border-radius: 50%; margin-right: 12px; object-fit: cover; }
        
        /* Ajuste fino para o Nome, Selo e Arroba */
        .user-info { display: flex; flex-direction: column; justify-content: center; line-height: 1.2; }
        .user-name-wrapper { display: flex; align-items: center; gap: 4px; font-size: 15px; font-weight: 700; color: #0f1419; }
        .verified-icon { fill: #1d9bf0; width: 1.2em; height: 1.2em; display: none; }
        .handle { font-size: 14px; color: #536471; margin-top: 2px;}
        
        .post-image { width: 100%; border-radius: 14px; margin-top: 5px; border: 1px solid #efefef; }
        
        .controls { margin-top: 25px; }
        #download { background: #0095f6; color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; transition: 0.2s; }
        #download:active { transform: scale(0.95); }
    </style>
</head>
